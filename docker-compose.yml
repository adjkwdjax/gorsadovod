name: gor-sad

services:
  backend:
    build:
      context: ./backend
    container_name: gor-sad-backend
    command: >
      sh -c "
      python manage.py makemigrations api &&
      python manage.py migrate &&
      (python manage.py shell -c 'from django.contrib.auth import get_user_model; import sys; sys.exit(0 if get_user_model().objects.filter(is_superuser=True).exists() else 1)' || python manage.py createsuperuser) &&
      python manage.py runserver 0.0.0.0:8000
      "
    working_dir: /app
    stdin_open: true
    tty: true
    volumes:
      - ./backend:/app
      - ./frontend/out:/frontend/out:ro
    ports:
      - "8000:8000" # Запуск Django на порту 8000
