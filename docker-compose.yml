name: gor-sad

services:
  backend:
    build:
      context: ./backend
    container_name: gor-sad-backend
    command: >
      sh -c "
      set -e;
      echo '[backend] makemigrations...';
      python manage.py makemigrations api;
      echo '[backend] migrate...';
      python manage.py migrate;
      echo '[backend] runserver...';
      python manage.py runserver 0.0.0.0:8000
      "
    working_dir: /app
    stdin_open: true
    tty: true
    volumes:
      - ./backend:/app
      - ./frontend/out:/frontend/out:ro
    ports:
      - "8000:8000" # Запуск Django на порту 8000
